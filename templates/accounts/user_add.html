{% extends 'base.html' %}
{% block title %}Add User{% endblock %}
{% block page_title %}Add User{% endblock %}

{% block content %}
<div class="card border-0 shadow-sm" style="max-width:600px;">
    <div class="card-header">
        <i class="bi bi-person-plus me-2"></i>New User
    </div>
    <div class="card-body">
        <form method="post">
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label">Username *</label>
                <input type="text" name="username" class="form-control" required>
            </div>
            <div class="row mb-3">
                <div class="col">
                    <label class="form-label">First Name</label>
                    <input type="text" name="first_name" class="form-control">
                </div>
                <div class="col">
                    <label class="form-label">Last Name</label>
                    <input type="text" name="last_name" class="form-control">
                </div>
            </div>
            <div class="mb-3">
                <label class="form-label">Email</label>
                <input type="email" name="email" class="form-control">
            </div>
            <div class="mb-3">
                <label class="form-label">Password *</label>
                <input type="password" name="password" class="form-control" required>
            </div>
            <div class="mb-3 form-check">
                <input type="checkbox" name="is_staff" class="form-check-input" id="is_staff">
                <label class="form-check-label" for="is_staff">
                    Pharmacist access (can view inventory and billing)
                </label>
            </div>
            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-success">
                    <i class="bi bi-check-circle me-1"></i>Create User
                </button>
                <a href="/accounts/users/" class="btn btn-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
