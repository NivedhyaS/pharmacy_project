{% extends 'base.html' %}
{% block title %}Add Category{% endblock %}
{% block page_title %}Add Category{% endblock %}

{% block content %}
<div class="card border-0 shadow-sm" style="max-width:500px;">
    <div class="card-header">
        <i class="bi bi-tags me-2"></i>New Category
    </div>
    <div class="card-body">
        <form method="post">
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label">Category Name *</label>
                <input type="text" name="name" class="form-control" value="{{ category.name|default:'' }}" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Description</label>
                <textarea name="description" class="form-control" rows="3">{{ category.description|default:'' }}</textarea>
            </div>
            <div class="mb-3">
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" name="is_active" id="isActive" {% if category.is_active|default:True %}checked{% endif %}>
                    <label class="form-check-label" for="isActive">Is Active</label>
                </div>
            </div>
            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-success">
                    <i class="bi bi-check-circle me-1"></i>Save
                </button>
                <a href="/drugs/categories/" class="btn btn-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
