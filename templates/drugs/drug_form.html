{% extends 'base.html' %}
{% block title %}{{ title }}{% endblock %}
{% block page_title %}{{ title }}{% endblock %}

{% block content %}
<div class="card border-0 shadow-sm" style="max-width:700px;">
    <div class="card-header">
        <i class="bi bi-capsule me-2"></i>{{ title }}
    </div>
    <div class="card-body">
        <form method="post">
            {% csrf_token %}
            <div class="row mb-3">
                <div class="col-md-6">
                    <label class="form-label">Drug Name *</label>
                    <input type="text" name="name" class="form-control" value="{{ drug.name|default:'' }}" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Brand</label>
                    <input type="text" name="brand" class="form-control" value="{{ drug.brand|default:'' }}">
                </div>
            </div>
            <div class="mb-3">
                <label class="form-label">Composition</label>
                <input type="text" name="composition" class="form-control" value="{{ drug.composition|default:'' }}">
            </div>
            <div class="row mb-3">
                <div class="col-md-6">
                    <label class="form-label">Category</label>
                    <select name="category" class="form-select">
                        <option value="">-- Select --</option>
                        {% for cat in categories %}
                        <option value="{{ cat.id }}" {% if drug.category.id == cat.id %}selected{% endif %}>
                            {{ cat.name }}
                        </option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Unit</label>
                    <select name="unit" class="form-select">
                        <option value="tablet" {% if drug.unit == 'tablet' %}selected{% endif %}>Tablet</option>
                        <option value="capsule" {% if drug.unit == 'capsule' %}selected{% endif %}>Capsule</option>
                        <option value="syrup" {% if drug.unit == 'syrup' %}selected{% endif %}>Syrup</option>
                        <option value="injection" {% if drug.unit == 'injection' %}selected{% endif %}>Injection</option>
                        <option value="drops" {% if drug.unit == 'drops' %}selected{% endif %}>Drops</option>
                        <option value="cream" {% if drug.unit == 'cream' %}selected{% endif %}>Cream</option>
                        <option value="others" {% if drug.unit == 'others' %}selected{% endif %}>Others</option>
                    </select>
                </div>
            </div>
            <div class="row mb-3">
                <div class="col-md-6">
                    <label class="form-label">HSN Code</label>
                    <input type="text" name="hsn_code" class="form-control" value="{{ drug.hsn_code|default:'' }}">
                </div>
                <div class="col-md-6">
                    <label class="form-label">Min Stock</label>
                    <input type="number" name="min_stock" class="form-control" value="{{ drug.min_stock|default:10 }}">
                </div>
            </div>
            <hr>
            <h6 class="text-success mb-3">Location</h6>
            <div class="row mb-3">
                <div class="col-md-3">
                    <label class="form-label">Rack No</label>
                    <input type="text" name="rack_number" class="form-control" value="{{ drug.rack_number|default:'' }}"
                        placeholder="R-1">
                </div>
                <div class="col-md-3">
                    <label class="form-label">Row</label>
                    <input type="text" name="row" class="form-control" value="{{ drug.row|default:'' }}"
                        placeholder="Row 1">
                </div>
                <div class="col-md-3">
                    <label class="form-label">Shelf</label>
                    <input type="text" name="shelf" class="form-control" value="{{ drug.shelf|default:'' }}"
                        placeholder="Top">
                </div>
                <div class="col-md-3">
                    <label class="form-label">Section</label>
                    <input type="text" name="section" class="form-control" value="{{ drug.section|default:'' }}"
                        placeholder="Antibiotics">
                </div>
            </div>
            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-success">
                    <i class="bi bi-check-circle me-1"></i>Save
                </button>
                <a href="/drugs/" class="btn btn-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
