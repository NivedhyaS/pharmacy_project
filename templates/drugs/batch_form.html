{% extends 'base.html' %}
{% block title %}Add Batch{% endblock %}
{% block page_title %}Add Batch{% endblock %}

{% block content %}
<div class="card border-0 shadow-sm" style="max-width:600px;">
    <div class="card-header">
        <i class="bi bi-box-seam me-2"></i>New Batch
    </div>
    <div class="card-body">
        <form method="post">
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label">Drug *</label>
                <select name="drug" class="form-select" required>
                    <option value="">-- Select Drug --</option>
                    {% for d in drugs %}
                    <option value="{{ d.id }}">{{ d.name }} ({{ d.brand }})</option>
                    {% endfor %}
                </select>
            </div>
            <div class="mb-3">
                <label class="form-label">Batch Number *</label>
                <input type="text" name="batch_number" class="form-control" required>
            </div>
            <div class="row mb-3">
                <div class="col">
                    <label class="form-label">Manufacture Date *</label>
                    <input type="date" name="manufacture_date" class="form-control" required>
                </div>
                <div class="col">
                    <label class="form-label">Expiry Date *</label>
                    <input type="date" name="expiry_date" class="form-control" required>
                </div>
            </div>
            <div class="row mb-3">
                <div class="col">
                    <label class="form-label">Quantity *</label>
                    <input type="number" name="quantity" class="form-control" required>
                </div>
                <div class="col">
                    <label class="form-label">Purchase Price *</label>
                    <input type="number" name="purchase_price" class="form-control" step="0.01" required>
                </div>
                <div class="col">
                    <label class="form-label">Selling Price *</label>
                    <input type="number" name="selling_price" class="form-control" step="0.01" required>
                </div>
            </div>
            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-success">
                    <i class="bi bi-check-circle me-1"></i>Save Batch
                </button>
                <a href="/drugs/batches/" class="btn btn-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
