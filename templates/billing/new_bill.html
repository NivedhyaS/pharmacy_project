{% extends 'base.html' %}
{% block title %}New Bill{% endblock %}
{% block page_title %}New Bill{% endblock %}

{% block content %}
<div class="card border-0 shadow-sm">
    <div class="card-header bg-success text-white">
        <i class="bi bi-receipt me-2"></i>Counter Billing
    </div>
    <div class="card-body">
        <form method="post">
            {% csrf_token %}

            <!-- Patient Info -->
            <div class="row mb-4">
                <div class="col-md-4">
                    <label class="form-label">Patient Name</label>
                    <input type="text" name="patient_name" class="form-control">
                </div>
                <div class="col-md-4">
                    <label class="form-label">Doctor Name</label>
                    <input type="text" name="doctor_name" class="form-control">
                </div>
                <div class="col-md-4">
                    <label class="form-label">Payment Mode</label>
                    <select name="payment_mode" class="form-select">
                        <option value="cash">Cash</option>
                        <option value="upi">UPI</option>
                        <option value="card">Card</option>
                    </select>
                </div>
            </div>

            <!-- Items Table -->
            <h6 class="mb-3">Bill Items</h6>
            <div class="table-responsive">
                <table class="table table-bordered" id="items-table">
                    <thead class="table-success">
                        <tr>
                            <th>Drug</th>
                            <th>Batch</th>
                            <th>Price</th>
                            <th>Qty</th>
                            <th>Discount %</th>
                            <th>GST %</th>
                            <th></th>
                        </tr>
                    </thead>
                    <tbody id="items-body">
                        <tr>
                            <td>
                                <select name="drug" class="form-select form-select-sm drug-select">
                                    <option value="">-- Drug --</option>
                                    {% for d in drugs %}
                                    <option value="{{ d.id }}">{{ d.name }} ({{ d.brand }})</option>
                                    {% endfor %}
                                </select>
                            </td>
                            <td>
                                <select name="batch" class="form-select form-select-sm batch-select">
                                    <option value="">-- Batch --</option>
                                </select>
                            </td>
                            <td><input type="number" name="selling_price" class="form-control form-control-sm" readonly></td>
                            <td><input type="number" name="quantity" class="form-control form-control-sm" value="1" min="1"></td>
                            <td><input type="number" name="discount" class="form-control form-control-sm" value="0"></td>
                            <td><input type="number" name="gst_percent" class="form-control form-control-sm" value="12"></td>
                            <td><button type="button" class="btn btn-danger btn-sm" onclick="removeRow(this)">✕</button></td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <button type="button" class="btn btn-outline-success btn-sm mb-3" onclick="addRow()">
                <i class="bi bi-plus me-1"></i>Add Row
            </button>

            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-success btn-lg">
                    <i class="bi bi-check-circle me-1"></i>Generate Bill
                </button>
                <a href="/billing/" class="btn btn-secondary btn-lg">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
function addRow() {
    const tbody = document.getElementById('items-body');
    const first = tbody.rows[0];
    const clone = first.cloneNode(true);
    clone.querySelectorAll('input').forEach(i => {
        if (i.name === 'quantity') i.value = 1;
        else if (i.name === 'discount') i.value = 0;
        else if (i.name === 'gst_percent') i.value = 12;
        else i.value = '';
    });
    clone.querySelectorAll('select').forEach(s => s.selectedIndex = 0);
    clone.querySelector('.drug-select').addEventListener('change', loadBatches);
    tbody.appendChild(clone);
}

function removeRow(btn) {
    const tbody = document.getElementById('items-body');
    if (tbody.rows.length > 1) btn.closest('tr').remove();
}

function loadBatches(e) {
    const drugId = e.target.value;
    const row    = e.target.closest('tr');
    const batchSelect = row.querySelector('.batch-select');
    const priceInput  = row.querySelector('input[name="selling_price"]');

    batchSelect.innerHTML = '<option value="">-- Batch --</option>';
    priceInput.value = '';

    if (!drugId) return;

    fetch(`/drugs/batches/drug/${drugId}/`)
        .then(r => r.json())
        .then(data => {
            data.forEach(b => {
                const opt = document.createElement('option');
                opt.value = b.id;
                opt.text  = `${b.batch_number} | Exp: ${b.expiry_date} | Qty: ${b.quantity}`;
                opt.dataset.price = b.selling_price;
                batchSelect.appendChild(opt);
            });
        });

    batchSelect.addEventListener('change', function() {
        const selected = this.options[this.selectedIndex];
        priceInput.value = selected.dataset.price || '';
    });
}

document.querySelectorAll('.drug-select').forEach(s => {
    s.addEventListener('change', loadBatches);
});
</script>
{% endblock %}
